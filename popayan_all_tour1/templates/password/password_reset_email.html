<!DOCTYPE html>
<html>
<body style="margin:0; padding:0; background:#f4f4f4; font-family: Arial, sans-serif;">

        <img src="https://tu-dominio/logo.png" width="120">

  <table width="100%" cellpadding="0" cellspacing="0">
    <tr>
      <td align="center">

        <table width="500" style="background:white; margin-top:30px; border-radius:10px; overflow:hidden;">

          <!-- HEADER -->
          <tr>
            <td style="background:#0d6efd; color:white; padding:20px; text-align:center;">
              <h2 style="margin:0;">Popayán All Tour</h2>
            </td>
          </tr>

          <!-- BODY -->
          <tr>
            <td style="padding:30px; text-align:center;">
              
              <h3>Hola {{ user.nombre_completo }}</h3>

              <p>Recibimos una solicitud para restablecer tu contraseña.</p>

              <a href="{{ protocol }}://{{ domain }}{% url 'password_reset_confirm' uidb64=uid token=token %}"
                 style="display:inline-block; padding:12px 25px; background:#0d6efd; color:white; text-decoration:none; border-radius:5px; margin-top:15px;">
                 Restablecer contraseña
              </a>

              <p style="margin-top:20px; font-size:12px; color:#777;">
                Si no solicitaste este cambio, puedes ignorar este mensaje.
              </p>

            </td>
          </tr>

          <!-- FOOTER -->
          <tr>
            <td style="background:#f1f1f1; padding:15px; text-align:center; font-size:12px; color:#555;">
              Popayán, Colombia 🇨🇴
            </td>
          </tr>

        </table>

      </td>
    </tr>
  </table>

</body>
</html>
